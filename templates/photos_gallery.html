<div class="space-y-8">
  {{range .Photos}}
  <div>
    <img src="{{.Source}}" alt="Photo: {{.Name}}" loading="lazy" onclick="openLightbox(this.src, this.alt)"
      onload="this.classList.add('photo-loaded')"
      class="max-h-[75vh] w-full object-contain cursor-pointer hover:opacity-90 photo-fade" />
    <p class="text-xs text-muted mt-2 font-mono">{{.Date}}</p>
  </div>
  {{else}}
  <p class="text-sm text-muted">No photos yet.</p>
  {{end}}
</div>

{{if eq .NextPage -1}}
<div id="loadMoreBtn" class="flex justify-center mt-8">
  <span class="text-xs text-muted">That's all for now</span>
</div>
{{else}}
<div id="loadMoreBtn" class="flex justify-center mt-8">
  <button class="text-sm text-muted hover:text-text border border-border rounded-md px-4 py-2 transition-colors"
    hx-get="/photos/" hx-vals='{"page": {{.NextPage}}}' hx-swap="outerHTML" hx-target="#loadMoreBtn">Load more</button>
</div>
{{end}}

<div id="lightbox" onclick="closeLightbox(event)"
  class="fixed inset-0 z-50 hidden items-center justify-center bg-black/80 backdrop-blur-sm cursor-pointer">
  <img id="lightbox-img" src="" alt="" class="max-w-[90vw] max-h-[90vh] object-contain" />
</div>

<script>
  function openLightbox(src, alt) {
    var lb = document.getElementById("lightbox");
    var img = document.getElementById("lightbox-img");
    img.src = src;
    img.alt = alt;
    lb.classList.remove("hidden");
    lb.classList.add("flex", "lightbox-open");
  }
  function closeLightbox(e) {
    if (e.target.id === "lightbox") {
      var lb = document.getElementById("lightbox");
      lb.classList.add("hidden");
      lb.classList.remove("flex", "lightbox-open");
    }
  }
</script>
