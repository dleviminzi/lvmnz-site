<style>
  .photo-item {
    position: relative;
    border: 2px solid black;
    padding: 20px;
    margin-bottom: 30px;
  }

  .date-tab {
    position: absolute;
    top: -20px;
    left: 10px;
    background-color: #f2f2f2;
    border: 2px solid black;
    padding: 2px 5px;
    font-style: italic;
  }

  .photo-container {
    width: 100%;
    height: 0;
    padding-bottom: 75%;
    /* Adjust this value to change the aspect ratio */
    position: relative;
    overflow: hidden;
  }

  .photo-container img {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
</style>

<div class="pt-6 lg:grid lg:grid-cols-12 lg:gap-4 overflow-y-auto">
  <div class="lg:col-start-2 lg:col-span-10 grid grid-cols-1 md:grid-cols-2 gap-8">
    {{range .Photos}}
    <div class="photo-item">
      <div class="date-tab">{{.Date}}</div>
      <div class="photo-container">
        <img src="{{.Source}}" alt="Photo: {{.Name}}" loading="lazy" />
      </div>
    </div>
    {{else}}
    <p>No images found.</p>
    {{end}}
  </div>
</div>

{{if eq .NextPage -1}}
<div id="loadMoreBtn" class="flex justify-center items-center mb-4">
  <p class="border bg-white border-periwinkle transition-all shadow-md px-4 py-2">No More</p>
</div>
{{else}}
<div id="loadMoreBtn" class="flex justify-center items-center mb-4">
  <button class="border bg-white border-periwinkle transition-all hover:bg-periwinkle shadow-md px-3 py-1 rounded"
    hx-get="/photos/" hx-vals='{"page": {{.NextPage}}}' hx-swap="outerHTML" hx-target="#loadMoreBtn">Load More</button>
</div>
{{end}}
