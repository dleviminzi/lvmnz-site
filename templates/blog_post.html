{{template "header.html" .}}
<div id="content">
  <div class="max-w-content mx-auto px-6 pb-16">
    <a class="inline-flex items-center gap-1 text-sm text-muted hover:text-text transition-colors mt-6 mb-8 fade-in fade-in-1"
      href="/blog/" hx-get="/blog/" hx-target="#content" hx-select="#content" hx-swap="outerHTML"
      hx-push-url="/blog/">&larr; Thoughts</a>
    <article class="fade-in fade-in-2 prose prose-sm max-w-none
      prose-headings:text-text prose-p:text-text prose-strong:text-text
      prose-a:text-text prose-a:underline prose-a:decoration-border hover:prose-a:decoration-text
      prose-code:font-mono prose-code:text-sm
      prose-pre:bg-[var(--code-bg)] prose-pre:rounded-lg
      prose-img:rounded-lg
      prose-hr:border-border">
      {{.Content}}
    </article>
  </div>
</div>
{{template "footer.html" .}}
