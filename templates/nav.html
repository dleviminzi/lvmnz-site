<div class="max-w-content mx-auto px-6 pt-12 pb-4">
  <div class="flex items-center justify-between">
    <a class="text-lg font-medium text-text" href="/" hx-get="/" hx-target="#content" hx-select="#content"
      hx-swap="outerHTML" hx-push-url="/">Daniel Levi-Minzi</a>
    <div class="flex items-center gap-4">
      <p class="hidden sm:block text-sm text-muted font-mono" aria-label="Software engineer in New York"><span
          id="ascii-loop"></span><span id="ascii-cursor">▌</span></p>
      <button id="theme-btn" onclick="toggleTheme()" class="text-muted hover:text-text transition-colors p-1"
        aria-label="Toggle theme">
        <svg class="dark:hidden w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" />
        </svg>
        <svg class="hidden dark:block w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" />
        </svg>
      </button>
    </div>
  </div>
  <nav class="flex items-center gap-4 text-sm text-muted mt-2 sm:mt-0">
    <a class="text-muted hover:text-text transition-colors" href="/blog/" hx-get="/blog/" hx-target="#content"
      hx-select="#content" hx-swap="outerHTML" hx-push-url="/blog/">Writing</a>
    <a class="text-muted hover:text-text transition-colors" href="/photos/" hx-get="/photos/" hx-target="#content"
      hx-select="#content" hx-swap="outerHTML" hx-push-url="/photos/">Photos</a>
  </nav>
</div>
<script>
  (function () {
    var el = document.getElementById("ascii-loop");
    if (!el) return;
    var phrases = [
      "software engineer in nyc ",
      "directing the bots ",
      "building stuff ",
      "starting kitchen fires ",
      "watching movies ",
      "taking photos "
    ];
    var pi = 0, ci = 0, deleting = false, pause = 0;
    var cur = document.getElementById("ascii-cursor");

    function tick() {
      var phrase = phrases[pi];
      if (pause > 0) {
        pause--;
        el.textContent = phrase;
        cur.classList.add("cursor-blink");
        setTimeout(tick, 80);
        return;
      }
      cur.classList.remove("cursor-blink");
      if (!deleting) {
        ci++;
        el.textContent = phrase.slice(0, ci);
        if (ci === phrase.length) {
          pause = 30;
          deleting = true;
        }
        setTimeout(tick, 50 + Math.random() * 40);
      } else {
        ci--;
        el.textContent = (ci > 0 ? phrase.slice(0, ci) : "");
        if (ci === 0) {
          deleting = false;
          pi++;
          if (pi >= phrases.length) {
            ci = 0;
            var end = "~/";
            function typeEnd() {
              ci++;
              el.textContent = end.slice(0, ci);
              if (ci >= end.length) {
                el.textContent = end + " ";
                document.getElementById("ascii-cursor").classList.add("cursor-blink");
                return;
              }
              setTimeout(typeEnd, 50 + Math.random() * 40);
            }
            setTimeout(typeEnd, 300);
            return;
          }
          setTimeout(tick, 300);
        } else {
          setTimeout(tick, 30);
        }
      }
    }
    tick();
  })();

  function toggleTheme() {
    var d = document.documentElement.classList;
    var btn = document.getElementById("theme-btn");
    btn.classList.remove("theme-spin");
    void btn.offsetWidth;
    btn.classList.add("theme-spin");
    if (d.contains("dark")) {
      d.remove("dark");
      localStorage.setItem("theme", "light");
    } else {
      d.add("dark");
      localStorage.setItem("theme", "dark");
    }
  }
</script>
